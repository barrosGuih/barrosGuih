name: generate animation

on:
  # Roda automaticamente a cada 24 horas
  schedule:
    - cron: "0 */24 * * *" 
  
  # Permite rodar manualmente a qualquer momento
  workflow_dispatch:
  
  # Roda a cada push na branch master
  push:
    branches:
    - master

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Gera o jogo da cobrinha com cores personalizadas (Dark & Blue)
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # Versão Light (Azul padrão)
            dist/github-contribution-grid-snake.svg?color_snake=#3b82f6&color_dots=#ebedf0,#bfdbfe,#60a5fa,#3b82f6,#1d4ed8
            
            # VERSÃO DARK (Azul Neon e Fundo Escuro) - Personalizada conforme solicitado
            dist/github-contribution-grid-snake-dark.svg?color_snake=#00d2ff&color_dots=#0e1117,#003049,#005073,#007fb3,#00d2ff
          
      # Envia o conteúdo gerado para a branch 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
